name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Install your remaining CI testing/typing tools
          pip install pytest pytest-cov mypy
          
      # Using the official Ruff Action bypasses 'command not found' errors
      - name: Run Linting (Ruff)
        uses: astral-sh/ruff-action@v1
        with:
          args: "check . --fix"
          
      # Ensure you run format check separately if needed for CI gates
      - name: Run Formatting Check (Ruff)
        uses: astral-sh/ruff-action@v1
        with:
          args: "format --check ."
        
      - name: Run Strict Typing (Mypy)
        run: mypy .
        
      - name: Run Test Suite
        run: pytest --cov=. --cov-fail-under=80
