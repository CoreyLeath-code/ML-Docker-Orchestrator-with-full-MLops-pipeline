services:
  orchestrator:
    build: .
    image: ml-docker-orchestrator:local
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      APP_ENV: production
      MODEL_BACKEND: deterministic
      MAX_BATCH_SIZE: "1000"
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped
